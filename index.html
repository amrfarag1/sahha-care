<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صحة كير - الوكيل الذكي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .chat-container {
      max-width: 900px;
      margin: 0 auto;
    }
    .message {
      max-width: 80%;
    }
    .typing span {
      animation: blink 1.4s infinite;
    }
    @keyframes blink {
      0%, 20%, 50%, 80%, 100% {
        opacity: 1;
      }
      40% {
        opacity: 0.5;
      }
      60% {
        opacity: 0.7;
      }
    }
    #chat-messages {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-gray-50 to-gray-100 min-h-screen">
  <div class="chat-container mx-auto h-screen flex flex-col">
    
    <!-- Header -->
    <div class="bg-white shadow-md border-b border-emerald-100 p-4 rounded-t-2xl">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
            <i class="fas fa-heart"></i>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-gray-800">صحة كير</h1>
            <p class="text-sm text-emerald-600">🤖 وكيلك الطبي الذكي</p>
          </div>
        </div>
        <button 
          onclick="clearChat()"
          class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-lg transition text-sm font-medium"
          title="مسح المحادثة">
          <i class="fas fa-trash-alt"></i> مسح
        </button>
      </div>
    </div>

    <!-- Chat Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-white rounded-b-2xl shadow-md">
      <!-- الرسائل ستظهر هنا -->
    </div>

    <!-- Input Area -->
    <div class="bg-white border-t border-gray-200 p-4 rounded-b-2xl shadow-md">
      <div class="flex gap-3">
        <input 
          id="user-input" 
          type="text" 
          placeholder="اكتب رسالتك هنا..."
          class="flex-1 border border-gray-300 rounded-2xl px-6 py-3 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition"
          onkeypress="if(event.key === 'Enter') sendMessage()">
        <button 
          onclick="sendMessage()"
          class="bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white px-8 py-3 rounded-2xl transition shadow-md hover:shadow-lg">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <p class="text-xs text-gray-500 mt-2 text-center">اضغط Enter أو انقر الزر لإرسال الرسالة</p>
    </div>
  </div>

  <script>
    const API_URL = "https://sahha-care-backend.onrender.com";
    
    let threadId = "thread_" + Math.random().toString(36).substring(7);

    function addMessage(role, content, isLoading = false) {
      const chat = document.getElementById("chat-messages");
      const id = "msg-" + Date.now();

      const div = document.createElement("div");
      div.id = id;
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message`;

      if (role === 'user') {
        div.innerHTML = `
          <div class="max-w-[80%] bg-emerald-600 text-white px-6 py-4 rounded-3xl rounded-br-none shadow-md">
            <p class="whitespace-pre-wrap break-words">${escapeHtml(content)}</p>
          </div>
        `;
      } else {
        div.innerHTML = `
          <div class="max-w-[80%] bg-gray-100 text-gray-800 px-6 py-4 rounded-3xl rounded-bl-none shadow-md">
            ${isLoading ? `<span class="typing text-gray-600">يكتب<span class="animate-pulse">...</span></span>` : `<p class="whitespace-pre-wrap break-words">${escapeHtml(content)}</p>`}
          </div>
        `;
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return id;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";
      input.focus();

      const loadingId = addMessage("assistant", "", true);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            input: {
              messages: [
                {
                  role: "user",
                  content: message
                }
              ]
            },
            config: {
              configurable: {
                thread_id: threadId
              }
            }
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        let answer = "عذراً، لم أتمكن من فهم طلبك.";
        
        // Try multiple response formats
        if (data.output?.messages?.length > 0) {
          answer = data.output.messages[data.output.messages.length - 1]?.content || answer;
        } else if (data.messages?.length > 0) {
          answer = data.messages[data.messages.length - 1]?.content || answer;
        } else if (data.response) {
          answer = data.response;
        } else if (typeof data === 'string') {
          answer = data;
        }

        document.getElementById(loadingId).remove();
        addMessage("assistant", answer);

      } catch (error) {
        document.getElementById(loadingId).remove();
        console.error("Error:", error);
        addMessage("assistant", `⚠️ حدث خطأ في الاتصال بالخادم:\n${error.message}`);
      }
    }

    function clearChat() {
      if (confirm("هل تريد مسح المحادثة؟ لا يمكن التراجع عن هذا الإجراء.")) {
        document.getElementById("chat-messages").innerHTML = "";
        threadId = "thread_" + Math.random().toString(36).substring(7);
        addMessage(
          "assistant",
          "مرحباً! 👋\nأنا وكيل صحة كير الذكي.\nكيف يمكنني مساعدتك اليوم؟"
        );
      }
    }

    window.onload = () => {
      addMessage(
        "assistant",
        "مرحباً! 👋\nأنا وكيل صحة كير الذكي.\nكيف يمكنني مساعدتك اليوم؟"
      );
      document.getElementById("user-input").focus();
    };
  </script>
</body>
</html>
