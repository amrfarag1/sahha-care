<!DOCTYPE html>
<html id="root-html" lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صحة كير – مجلس الإدارة الإستراتيجي</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --emerald:     #059669;
      --emerald-dk:  #047857;
      --emerald-lt:  #d1fae5;
      --emerald-mid: #6ee7b7;
      --surface:     #ffffff;
      --bg:          #f0fdf8;
      --border:      #d1fae5;
      --text:        #1a2e25;
      --text-muted:  #6b7280;
      --user-bg:     #059669;
      --user-text:   #ffffff;
      --bot-bg:      #f0fdf8;
      --bot-border:  #a7f3d0;
      --danger:      #ef4444;
      --shadow:      0 4px 24px rgba(5,150,105,.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Language toggle ── */
    .lang-btn {
      display: flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, #047857, #059669);
      color: #fff; border: none; border-radius: 10px;
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 3px 10px rgba(5,150,105,.30);
      transition: all .2s; letter-spacing: .3px;
    }
    .lang-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(5,150,105,.40); }
    .lang-btn i { font-size: 12px; }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow);
      flex-shrink: 0; z-index: 10;
      gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo-img {
      width: 48px; height: 48px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(5,150,105,.25));
    }

    .header-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .header-sub   { font-size: 11.5px; color: var(--emerald); margin-top: 2px; letter-spacing: .2px; }

    .status-dot {
      display: inline-block; width: 7px; height: 7px;
      background: #22c55e; border-radius: 50%; margin-inline-end: 5px;
      box-shadow: 0 0 0 2px #bbf7d0;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 2px #bbf7d0; }
      50%      { box-shadow: 0 0 0 5px #bbf7d070; }
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .clear-btn {
      background: #fef2f2; color: var(--danger);
      border: 1.5px solid #fecaca; border-radius: 10px;
      padding: 7px 13px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .clear-btn:hover { background: #fee2e2; border-color: var(--danger); }

    /* ── Messages ── */
    #chat-messages {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--emerald-mid); border-radius: 4px; }

    .row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .row.user { flex-direction: row-reverse; }
    .row.bot  { flex-direction: row; }

    .row-avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .row.user .row-avatar { background: var(--emerald);    color: #fff; }
    .row.bot  .row-avatar { background: var(--emerald-lt); color: var(--emerald-dk); }

    .bubble {
      max-width: 72%; padding: 12px 16px; border-radius: 18px;
      font-size: 14.5px; line-height: 1.75;
      word-break: break-word; white-space: pre-wrap;
    }
    .row.user .bubble {
      background: var(--user-bg); color: var(--user-text);
      border-bottom-left-radius: 6px;
    }
    .row.bot .bubble {
      background: var(--bot-bg); color: var(--text);
      border: 1.5px solid var(--bot-border);
      border-bottom-right-radius: 6px;
    }

    /* typing dots */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--emerald-mid); display: block;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30%          { transform:translateY(-6px); }
    }

    /* ── Welcome screen ── */
    .welcome-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; gap: 16px; padding: 32px 24px; text-align: center;
    }
    .welcome-logo {
      width: 90px; height: 90px; object-fit: contain;
      filter: drop-shadow(0 4px 14px rgba(5,150,105,.30));
      animation: floatLogo 3.5s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .welcome-title {
      font-size: 22px; font-weight: 700; color: var(--text);
      line-height: 1.3;
    }
    .welcome-sub {
      font-size: 14px; color: var(--text-muted);
      max-width: 340px; line-height: 1.7;
    }
    .welcome-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--emerald-lt); color: var(--emerald-dk);
      border: 1.5px solid var(--bot-border);
      border-radius: 20px; padding: 6px 16px;
      font-size: 12.5px; font-weight: 600;
    }

    /* ── Confirm overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; animation: fadeIn .2s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .confirm-box {
      background: var(--surface); border-radius: 18px;
      padding: 28px 32px; max-width: 320px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.2); text-align: center;
    }
    .confirm-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .confirm-box p  { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel {
      flex:1; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px;
      background: transparent; cursor: pointer; font-family: inherit;
      font-size: 14px; color: var(--text-muted); transition: .2s;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-confirm {
      flex:1; padding: 10px; border: none; border-radius: 10px;
      background: var(--danger); color: #fff; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600; transition: .2s;
    }
    .btn-confirm:hover { background: #dc2626; }

    /* ── Input bar ── */
    .input-bar {
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 14px;
      padding: 11px 16px; font-size: 14.5px; font-family: inherit;
      outline: none; resize: none; max-height: 120px;
      transition: border-color .2s, box-shadow .2s;
      background: var(--bg); color: var(--text);
    }
    #user-input:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(5,150,105,.12); }
    #user-input:disabled { opacity: .5; cursor: not-allowed; }

    #send-btn {
      width: 46px; height: 46px; border-radius: 14px;
      background: var(--emerald); color: #fff; border: none;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 12px rgba(5,150,105,.3); flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled)  { background: var(--emerald-dk); box-shadow: 0 6px 18px rgba(5,150,105,.35); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    .input-hint {
      text-align: center; font-size: 11px; color: var(--text-muted);
      padding: 4px 0 8px;
    }

    /* ── LTR overrides ── */
    html[dir="ltr"] body { font-family: 'IBM Plex Sans', sans-serif; }
    html[dir="ltr"] .row.user .bubble {
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 6px;
    }
    html[dir="ltr"] .row.bot .bubble {
      border-bottom-right-radius: 18px;
      border-bottom-left-radius: 6px;
    }
  </style>
</head>

        welcomeBadge:  'جاهز للمساعدة',
        timeout:       '⏱ انتهت مهلة الاتصال. قد يكون الخادم في وضع السكون، حاول مجدداً بعد لحظة.',
        connErr:       (m) => `⚠️ تعذّر الاتصال بالخادم:\n${m}`,
        unknownResp:   'عذراً، تلقيت رداً بصيغة غير متوقعة. يرجى المحاولة مرة أخرى.',
      },
      en: {
        htmlLang:      'en',
        htmlDir:       'ltr',
        title:         'SAHHA CARE',
        sub:           'Strategic Board of Directors',
        langLabel:     'عربي',
        clearLabel:    'Clear',
        placeholder:   'Type your message here...',
        hint:          'Press Enter to send · Shift+Enter for new line',
        confTitle:     'Clear conversation?',
        confBody:      'This action cannot be undone. All messages will be deleted.',
        confCancel:    'Cancel',
        confConfirm:   'Clear',
        welcomeTitle:  'Welcome to SAHHA CARE',
        welcomeSub:    'Strategic Board of Directors — Your intelligent healthcare AI agent for the GCC region. Type your question to get started.',
        welcomeBadge:  'Ready to assist',
        timeout:       '⏱ Connection timed out. The server may be sleeping — please try again in a moment.',
        connErr:       (m) => `⚠️ Could not reach the server:\n${m}`,
        unknownResp:   'Sorry, I received an unexpected response format. Please try again.',
      }
    };

    // ── Logo src (shared) ─────────────────────────────────────────────────────────
    const LOGO_SRC = document.getElementById('header-logo').src;

    // ── Apply language ────────────────────────────────────────────────────────────
    function applyLang(l, redrawWelcome = false) {
      const t   = i18n[l];
      const html = document.getElementById('root-html');
      html.lang  = t.htmlLang;
      html.dir   = t.htmlDir;

      document.getElementById('hdr-title').textContent    = t.title;
      document.getElementById('hdr-sub').textContent      = t.sub;
      document.getElementById('lang-label').textContent   = t.langLabel;
      document.getElementById('clear-label').textContent  = t.clearLabel;
      document.getElementById('user-input').placeholder   = t.placeholder;
      document.getElementById('input-hint').textContent   = t.hint;
      document.getElementById('conf-title').textContent   = t.confTitle;
      document.getElementById('conf-body').textContent    = t.confBody;
      document.getElementById('conf-cancel').textContent  = t.confCancel;
      document.getElementById('conf-confirm').textContent = t.confConfirm;

      // Redraw welcome screen in correct language if still visible
      if (redrawWelcome && welcomeShown) {
        document.getElementById('chat-messages').innerHTML = '';
        showWelcome();
      }
    }

    function toggleLang() {
      lang = lang === 'ar' ? 'en' : 'ar';
      applyLang(lang, true);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function escapeHtml(t) {
      return t.replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])
      );
    }
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
    function setInputState(disabled) {          // FIX #8
      document.getElementById('user-input').disabled = disabled;
      document.getElementById('send-btn').disabled   = disabled;
    }
    function scrollBottom() {
      const c = document.getElementById('chat-messages');
      c.scrollTop = c.scrollHeight;
    }

    // ── Welcome screen ────────────────────────────────────────────────────────────
    function showWelcome() {
      const t    = i18n[lang];
      const chat = document.getElementById('chat-messages');
      welcomeShown = true;

      const div = document.createElement('div');
      div.id = 'welcome-screen';
      div.className = 'welcome-screen';
      div.innerHTML = `
        <img class="welcome-logo" src="${LOGO_SRC}" alt="logo">
        <div class="welcome-title" id="wlc-title">${escapeHtml(t.welcomeTitle)}</div>
        <div class="welcome-sub"  id="wlc-sub">${escapeHtml(t.welcomeSub)}</div>
        <div class="welcome-badge">
          <i class="fas fa-circle-check" style="color:var(--emerald);font-size:11px"></i>
          <span id="wlc-badge">${escapeHtml(t.welcomeBadge)}</span>
        </div>
      `;
      chat.appendChild(div);
    }

    function hideWelcome() {
      const w = document.getElementById('welcome-screen');
      if (w) { w.remove(); welcomeShown = false; }
    }

    // ── Message rendering ─────────────────────────────────────────────────────────
    function addMessage(role, content, isLoading = false) {
      hideWelcome();
      const chat = document.getElementById('chat-messages');
      const id   = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

      const row = document.createElement('div');
      row.id = id;
      row.className = `row ${role === 'user' ? 'user' : 'bot'}`;

      const icon   = role === 'user' ? 'fa-user' : 'fa-heart-pulse';
      const bubble = isLoading
        ? `<div class="typing-dots"><span></span><span></span><span></span></div>`
        : escapeHtml(content);                       // FIX #4

      row.innerHTML = `
        <div class="row-avatar"><i class="fas ${icon}"></i></div>
        <div class="bubble">${bubble}</div>
      `;
      chat.appendChild(row);
      scrollBottom();
      return id;
    }

    function removeMessage(id) {
      document.getElementById(id)?.remove();         // FIX #7
    }

    // ── Confirm modal ─────────────────────────────────────────────────────────────
    function showClearConfirm() {                    // FIX #5
      document.getElementById('confirm-overlay').style.display = 'flex';
    }
    function hideClearConfirm(e) {
      if (e && e.target !== document.getElementById('confirm-overlay')) return;
      document.getElementById('confirm-overlay').style.display = 'none';
    }
    function clearChat() {
      document.getElementById('confirm-overlay').style.display = 'none';
      document.getElementById('chat-messages').innerHTML = '';
      threadId = crypto.randomUUID();
      showWelcome();
    }

    // ── Send ──────────────────────────────────────────────────────────────────────
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    async function sendMessage() {
      if (isBusy) return;                            // FIX #8 double-send guard

      const input   = document.getElementById('user-input');
      const message = input.value.trim();
      if (!message) return;

      input.value = ''; input.style.height = 'auto';
      addMessage('user', message);

      isBusy = true;
      setInputState(true);
      const loadingId = addMessage('assistant', '', true);

      // FIX #6 — timeout
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), API_TIMEOUT);

      try {
        const response = await fetch(API_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          signal:  controller.signal,
          body: JSON.stringify({
            input: { messages: [{ role: 'user', content: message }] },
            config: { configurable: { thread_id: threadId } }
          })
        });

        clearTimeout(timer);
        if (!response.ok) throw new Error(`${response.status}: ${response.statusText}`);

        const data = await response.json();

        // FIX #3 — logged fallback chain
        let answer = null;
        if (data?.output?.messages?.length > 0)
          answer = data.output.messages.at(-1)?.content ?? null;
        if (!answer && data?.messages?.length > 0) {
          console.warn('[SAHHA] Fallback: data.messages', data);
          answer = data.messages.at(-1)?.content ?? null;
        }
        if (!answer && data?.response) {
          console.warn('[SAHHA] Fallback: data.response', data);
          answer = data.response;
        }
        if (!answer && typeof data === 'string') {
          console.warn('[SAHHA] Fallback: raw string');
          answer = data;
        }
        if (!answer) {
          console.warn('[SAHHA] Unknown shape:', JSON.stringify(data).slice(0, 300));
          answer = i18n[lang].unknownResp;
        }

        removeMessage(loadingId);
        addMessage('assistant', answer);

      } catch (err) {
        clearTimeout(timer);
        removeMessage(loadingId);
        const t       = i18n[lang];
        const errText = err.name === 'AbortError' ? t.timeout : t.connErr(err.message);
        console.error('[SAHHA] Fetch error:', err);
        addMessage('assistant', errText);
      } finally {
        isBusy = false;
        setInputState(false);
        document.getElementById('user-input').focus();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    window.onload = () => {
      applyLang(lang);
      showWelcome();
      document.getElementById('user-input').focus();
    };
  </script>
</body>
</html>
