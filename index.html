<script>
  const API_URL = "https://sahha-care-backend.onrender.com/agent";

  let threadId = "thread_" + Math.random().toString(36).substring(7);

  function addMessage(role, content, isLoading = false) {
    const chat = document.getElementById("chat-messages");
    const id = "msg-" + Date.now();

    const div = document.createElement("div");
    div.id = id;
    div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message`;

    if (role === 'user') {
      div.innerHTML = `
        <div class="max-w-[80%] bg-emerald-600 text-white px-6 py-4 rounded-3xl rounded-br-none">
          ${content}
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="max-w-[80%] bg-gray-100 text-gray-800 px-6 py-4 rounded-3xl rounded-bl-none">
          ${isLoading ? `<span class="typing">يكتب<span class="animate-pulse">...</span></span>` : content}
        </div>
      `;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return id;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    addMessage("user", message);
    input.value = "";

    const loadingId = addMessage("assistant", "", true);

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          input: {
            messages: [
              {
                role: "user",
                content: message
              }
            ]
          },
          config: {
            configurable: {
              thread_id: threadId
            }
          }
        })
      });

      const data = await response.json();

      const answer =
        data.output?.messages?.[data.output.messages.length - 1]?.content ||
        data.messages?.[data.messages.length - 1]?.content ||
        "عذراً، لم أتمكن من فهم طلبك.";

      document.getElementById(loadingId).remove();
      addMessage("assistant", answer);

    } catch (error) {
      document.getElementById(loadingId).remove();
      addMessage("assistant", "حدث خطأ في الاتصال بالخادم.");
      console.error(error);
    }
  }

  function clearChat() {
    if (confirm("هل تريد مسح المحادثة؟")) {
      document.getElementById("chat-messages").innerHTML = "";
      addMessage(
        "assistant",
        "مرحباً! 👋 أنا وكيل صحة كير الذكي. كيف يمكنني مساعدتك اليوم؟"
      );
      threadId = "thread_" + Math.random().toString(36).substring(7);
    }
  }

  window.onload = () => {
    addMessage(
      "assistant",
      "مرحباً! 👋\nأنا وكيل صحة كير الذكي.\nكيف يمكنني مساعدتك اليوم؟"
    );
  };
</script>
